<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z Universe - Explore</title>
    <style>
        /* CSS Styling for the UI Overlay */
        body { 
            margin: 0; 
            overflow: hidden; /* Hides scrollbars */
            background-color: #000; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        #ui-container { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
            pointer-events: none; /* Lets clicks pass through to the 3D canvas */
        }
        
        h1 { 
            margin: 0; 
            font-size: 28px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .instructions {
            font-size: 13px;
            color: #aaa;
            margin-top: 5px;
        }

        #info-panel { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            width: 280px; 
            background: rgba(15, 15, 20, 0.85); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            backdrop-filter: blur(5px);
            display: none; /* Hidden until a planet is clicked */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        #info-panel h2 { 
            margin-top: 0; 
            font-size: 22px; 
            color: #4facfe; 
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        
        #info-panel p { 
            font-size: 14px; 
            line-height: 1.6; 
            color: #e0e0e0; 
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <h1>Z Universe</h1>
        <div class="instructions">Left Click & Drag: Orbit | Scroll: Zoom | Click Objects: Info</div>
    </div>

    <div id="info-panel">
        <h2 id="planet-name">Planet</h2>
        <p id="planet-desc">Description</p>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. Core Setup: Scene, Camera, Renderer
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio); // Sharper rendering
        document.body.appendChild(renderer.domElement);

        // 2. Camera Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // Smooth camera momentum
        controls.dampingFactor = 0.05;
        controls.maxDistance = 200; // Limit zoom out
        controls.minDistance = 5;   // Limit zoom in

        // 3. Lighting
        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);
        // Point light representing sunlight
        const sunLight = new THREE.PointLight(0xffffff, 3, 300);
        scene.add(sunLight);

        // Array to store interactable objects
        const interactableObjects = [];

        // 4. Create the Sun
        const sunGeometry = new THREE.SphereGeometry(4, 64, 64);
        const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffcc00 }); // Basic material doesn't need external light
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        sun.userData = { name: "The Sun", desc: "A yellow dwarf star at the center of our solar system. It accounts for 99.86% of the mass in the solar system." };
        scene.add(sun);
        interactableObjects.push(sun);

        // Helper function to create planets
        function createPlanet(radius, color, distance, speed, name, desc) {
            const geometry = new THREE.SphereGeometry(radius, 32, 32);
            const material = new THREE.MeshStandardMaterial({ color: color, roughness: 0.7 });
            const mesh = new THREE.Mesh(geometry, material);
            
            // Create an invisible pivot point to easily rotate the planet around the sun
            const orbitPivot = new THREE.Group();
            orbitPivot.add(mesh);
            mesh.position.x = distance;
            scene.add(orbitPivot);

            // Add orbital ring
            const ringGeo = new THREE.RingGeometry(distance - 0.05, distance + 0.05, 64);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.1, side: THREE.DoubleSide });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            scene.add(ring);

            // Save data inside the 3D object for UI access later
            mesh.userData = { name, desc, distance, orbitPivot, speed };
            interactableObjects.push(mesh);
            return mesh;
        }

        // Generate Planets
        const earth = createPlanet(1, 0x2255ff, 15, 0.005, "Earth", "Our home planet. The only astronomical object known to harbor life. It has an oxygen-rich atmosphere and vast oceans.");
        const mars = createPlanet(0.7, 0xff4422, 22, 0.003, "Mars", "The Red Planet. Its red color comes from iron oxide (rust) on its surface. It features the largest volcano in the solar system, Olympus Mons.");
        const jupiter = createPlanet(2.5, 0xd2b48c, 35, 0.001, "Jupiter", "A gas giant and the largest planet in the solar system. Famous for its Great Red Spot, a massive storm that has raged for centuries.");

        // 5. Starry Background
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 3000;
        const posArray = new Float32Array(starsCount * 3);
        
        for(let i = 0; i < starsCount * 3; i++) {
            // Scatter stars randomly in a large sphere
            posArray[i] = (Math.random() - 0.5) * 400; 
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const starsMaterial = new THREE.PointsMaterial({ size: 0.2, color: 0xffffff, transparent: true, opacity: 0.8 });
        const starField = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starField);

        // Initial Camera Position
        camera.position.set(0, 30, 60);

        // 6. Interaction Logic (Raycaster)
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        const infoPanel = document.getElementById('info-panel');
        const planetNameEl = document.getElementById('planet-name');
        const planetDescEl = document.getElementById('planet-desc');

        window.addEventListener('click', (event) => {
            // Convert mouse click to 3D space coordinates
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            // Cast a ray from camera to the mouse position
            raycaster.setFromCamera(mouse, camera);

            // Check if ray hits any of our objects
            const intersects = raycaster.intersectObjects(interactableObjects);
            
            if (intersects.length > 0) {
                const clickedObject = intersects[0].object;
                // Update HTML UI with 3D object data
                planetNameEl.innerText = clickedObject.userData.name;
                planetDescEl.innerText = clickedObject.userData.desc;
                infoPanel.style.display = 'block';
            } else {
                infoPanel.style.display = 'none'; // Hide if clicking empty space
            }
        });

        // Handle Window Resizing gracefully
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 7. Core Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            // Rotate Sun on its axis
            sun.rotation.y += 0.002;

            // Animate Planet Orbits
            interactableObjects.forEach(obj => {
                if(obj.userData.orbitPivot) {
                    obj.userData.orbitPivot.rotation.y += obj.userData.speed; // Orbit speed
                    obj.rotation.y += 0.01; // Planet's own axis rotation
                }
            });

            // Slowly rotate the entire starfield for effect
            starField.rotation.y -= 0.0002;

            controls.update(); // Required if damping is enabled
            renderer.render(scene, camera);
        }

        // Start the engine
        animate();
    </script>
</body>
</html>
