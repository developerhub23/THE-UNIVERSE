<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>THE UNIVERSE - Test</title>
    <style>
        body { background: #050508; color: white; font-family: Arial, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; align-items: center; justify-content: center; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        #loading-overlay.hidden { display: none; }
        .loading-spinner { width: 60px; height: 60px; border: 4px solid #333; border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { margin-top: 20px; font-size: 1.2rem; }
        .content { text-align: center; }
        .content h1 { font-size: 3rem; margin-bottom: 20px; }
        .content p { color: #aaa; }
    </style>
</head>
<body>
    <div id="loading-overlay" class="loading-overlay">
        <div>
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading THE UNIVERSE...</div>
        </div>
    </div>
    
    <div class="content">
        <h1>THE UNIVERSE</h1>
        <p>Site loaded successfully!</p>
        <p id="status">Checking JavaScript...</p>
    </div>
    
    <script>
        // IMMEDIATELY hide loading overlay
        console.log('JavaScript is running');
        document.getElementById('loading-overlay').classList.add('hidden');
        document.getElementById('status').textContent = 'JavaScript is working!';
        
        // Also hide after 1 second as backup
        setTimeout(function() {
            document.getElementById('loading-overlay').classList.add('hidden');
        }, 1000);
    </script>
</body>
</html>
