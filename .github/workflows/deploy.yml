name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'server/**'
      - '.env'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy built files
        run: |
          # Remove all files except .github and server folders
          find . -maxdepth 1 ! -name '.github' ! -name 'server' ! -name '.git' -exec rm -rf {} + 2>/dev/null || true
          
          # Copy built files to root
          cp -r dist/* ./
          cp -r dist/.* . 2>/dev/null || true
          rm -rf dist
          
          # Commit and push
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Auto-deploy: Update production build [skip ci]" --allow-empty
          git push
