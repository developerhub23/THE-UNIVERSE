name: Build and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'server/**'
      - '.env'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - run: npm run build

      - name: Deploy to main
        run: |
          cp -r dist/* ./
          cp -r dist/.* . 2>/dev/null || true
          rm -rf dist
          
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Deploy: Update built files [skip ci]" --allow-empty
          git push
