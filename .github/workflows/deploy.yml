name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'server/**'
      - '.env'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: ''
      VITE_SPACEFLIGHT_NEWS_API: 'https://api.spaceflightnewsapi.net/v4'
    steps:
      - uses: actions/checkout@v4

      - name: Debug - List repository files
        run: find . -maxdepth 2 -type f -name "*.js" -o -name "*.jsx" -o -name "*.json" -o -name "*.html" -o -name "*.css" | grep -v node_modules | grep -v server | head -30

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Debug - Node and npm versions
        run: |
          echo "Node version:" $(node --version)
          echo "npm version:" $(npm --version)

      - name: Clean install
        run: |
          rm -rf node_modules package-lock.json dist
          npm cache clean --force
          npm install

      - name: Build with Vite
        run: |
          echo "Running vite build..."
          npx vite build --mode production
          echo "Build exit code: $?"
          ls -la dist/ 2>/dev/null || echo "ERROR: dist directory not created"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4