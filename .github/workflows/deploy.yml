name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'server/**'
      - '.env'

permissions:
  contents: read
  pages: write
  id-token: write

environment:
  name: github-pages
  url: https://developerhub23.github.io/THE-UNIVERSE/

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove duplicate client directory
        run: rm -rf client/

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://developerhub23.github.io/THE-UNIVERSE/
    steps:
      - uses: actions/deploy-pages@v4