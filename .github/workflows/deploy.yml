name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'server/**'
      - '.env'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: ''
      VITE_SPACEFLIGHT_NEWS_API: 'https://api.spaceflightnewsapi.net/v4'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm ci || npm install

      - name: Build project
        run: |
          npm run build
          ls -la dist/ || echo "dist directory not found"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4